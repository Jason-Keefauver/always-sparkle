<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contractor Application</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="favicon.png">
</head>
<body>

  <div class="application-container">
    
    <!-- LOGO CENTERED -->
    <div class="logo-container">
      <img src="logo.png" alt="Company Logo">
    </div>

    <h1>Contractor Application</h1>

    <form>
  <div class="fields-wrapper">
    <label for="fullName">Full Name</label>
    <input type="text" id="fullName" name="fullName" placeholder="Enter your full name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Enter your email" required>

    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" name="phone" placeholder="Enter your phone number" required>

    <label for="address">Address</label>
    <input type="text" id="address" name="address" placeholder="Enter your current address" required>


    <label for="experience">Experience</label>
    <textarea id="experience" name="experience" rows="4" placeholder="Tell us about your cleaning experience"></textarea>

    <label for="availability">Availability</label>
    <select id="availability" name="availability">
      <option value="">Select availability</option>
      <option value="weekdays">Weekdays</option>
      <option value="weekends">Weekends</option>
      <option value="both">Both</option>
    </select>

      <!-- CHECKBOXES -->
  <div class="checkbox-group">
    <label>
      <input type="checkbox" name="insurance" value="yes">
      I have valid insurance (required)
    </label>
    <label>
      <input type="checkbox" name="certification" value="yes">
      I have cleaning certification (optional)
    </label>
    <label>
      <input type="checkbox" name="backgroundCheck" value="yes">
      I consent to a background check (required)
    </label>
  </div>
    

    <button type="submit">Submit Application</button>
  </div>
</form>

  </div>

</body>
</html>
